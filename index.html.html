<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#059669">
<title>Finanças Moscardo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --card: #14141e;
  --card2: #1a1a28;
  --border: #2a2a3f;
  --text: #e8e4f0;
  --muted: #6b7280;
  --green: #34d399;
  --green-dim: #065f46;
  --red: #f87171;
  --red-dim: #7f1d1d;
  --blue: #60a5fa;
  --purple: #c084fc;
  --yellow: #fbbf24;
  --btn: #059669;
  --btn-hover: #047857;
  --radius: 16px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }

body {
  font-family: 'Space Grotesk', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }

/* ══════════════════════════════════════════════════════════
   LOGIN / PERFIL
══════════════════════════════════════════════════════════ */
#screen-login {
  background: radial-gradient(ellipse at 50% 0%, #065f4640 0%, transparent 60%), var(--bg);
  justify-content: center;
  align-items: center;
  padding: 24px;
  gap: 0;
  overflow-y: auto;
}

.login-logo {
  font-size: 52px;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 20px #34d39966);
  animation: pulse-logo 3s ease-in-out infinite;
}
@keyframes pulse-logo {
  0%,100% { filter: drop-shadow(0 0 20px #34d39966); }
  50% { filter: drop-shadow(0 0 32px #34d399aa); }
}

.login-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  width: 100%;
  max-width: 380px;
}

.profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.profile-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  cursor: pointer; transition: border-color .2s, background .2s;
  position: relative;
}
.profile-item:active { background: #1f1f30; }
.profile-item .icon { font-size: 22px; flex-shrink: 0; }
.profile-item .name { flex: 1; font-weight: 600; font-size: 15px; }
.profile-actions { display: flex; gap: 6px; }
.profile-actions button {
  background: none; border: none; font-size: 16px; cursor: pointer;
  padding: 4px 6px; border-radius: 6px; line-height: 1;
  transition: background .15s;
}
.profile-actions button:active { background: var(--border); }

.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

.input-row { display: flex; gap: 8px; }
input, select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 14px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  outline: none; transition: border-color .2s;
  width: 100%;
}
input:focus, select:focus { border-color: var(--green); }
input[type=password] { letter-spacing: 3px; }

.btn {
  background: var(--btn); color: #fff; font-family: inherit;
  font-size: 14px; font-weight: 700; border: none;
  padding: 11px 20px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { background: var(--btn-hover); transform: scale(.97); }
.btn.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn.btn-ghost { background: var(--card2); color: var(--muted); }
.btn.btn-danger { background: #7f1d1d; color: var(--red); }
.btn.btn-purple { background: #4c1d95; color: var(--purple); }
.btn.btn-blue { background: #1e3a5f; color: var(--blue); }
.btn.full { width: 100%; display: block; text-align: center; margin-top: 8px; }

.err-msg { color: var(--red); font-size: 12px; margin-top: 6px; min-height: 16px; }

/* ══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════ */
#screen-app { background: var(--bg); }

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, #059669, #047857);
  padding: 12px 16px 10px;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.app-header .logo { font-size: 20px; }
.app-header .title { font-size: 17px; font-weight: 700; flex: 1; }
.header-btn {
  background: rgba(255,255,255,.15); border: none; color: #fff;
  font-size: 12px; font-weight: 600; font-family: inherit;
  padding: 6px 10px; border-radius: 8px; cursor: pointer;
  transition: background .15s; white-space: nowrap;
}
.header-btn:active { background: rgba(255,255,255,.25); }

/* ── NAV BAR (months) ── */
.month-nav {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 8px 12px; display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.month-nav button {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 16px;
  width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.month-nav button:active { background: var(--border); }
.month-label {
  flex: 1; text-align: center; font-size: 15px; font-weight: 700;
  color: var(--text); letter-spacing: .5px;
}
.today-btn {
  background: none; border: none; color: var(--muted); font-family: inherit;
  font-size: 11px; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; transition: background .15s;
}
.today-btn:active { background: var(--border); }

/* ── CARDS ── */
.summary-cards {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; padding: 10px 12px;
  flex-shrink: 0;
}
.s-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 10px 8px;
}
.s-card .label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.s-card .value { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1.2; }
.s-card .value.green { color: var(--green); }
.s-card .value.red { color: var(--red); }

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex; padding: 0 12px 8px; gap: 6px;
  flex-shrink: 0;
}
.filter-tab {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); font-family: inherit; font-size: 12px;
  font-weight: 600; padding: 6px 14px; border-radius: 20px;
  cursor: pointer; transition: all .15s;
}
.filter-tab.active { background: var(--green); border-color: var(--green); color: #fff; }
.filter-tab:active { opacity: .8; }

/* ── TRANSACTION LIST ── */
.tx-list-container {
  flex: 1; overflow-y: auto; padding: 0 12px;
  -webkit-overflow-scrolling: touch;
}
.tx-empty {
  text-align: center; color: var(--muted); padding: 48px 20px;
  font-size: 14px;
}
.tx-empty .big { font-size: 40px; margin-bottom: 12px; }

.tx-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  margin-bottom: 6px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color .15s, background .15s;
  position: relative;
  -webkit-user-select: none; user-select: none;
}
.tx-item.receita { border-left: 3px solid var(--green); }
.tx-item.despesa { border-left: 3px solid var(--red); }
.tx-item.selected { background: var(--card2); border-color: var(--blue); }

.tx-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.tx-icon.receita { background: var(--green-dim); }
.tx-icon.despesa { background: var(--red-dim); }

.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 14px; font-weight: 600; truncate; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
.badge {
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: .5px;
}
.badge.fixo { background: #1e3a5f; color: var(--blue); }
.badge.parc { background: #1a1040; color: var(--purple); }
.badge.fin  { background: #2d1a1a; color: #fca57a; }

.tx-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600; flex-shrink: 0;
  text-align: right;
}
.tx-value.receita { color: var(--green); }
.tx-value.despesa { color: var(--red); }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(70px + var(--safe-bottom)); right: 16px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #059669, #10b981);
  border: none; color: #fff; font-size: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px #05966966;
  transition: transform .15s, box-shadow .15s;
  z-index: 100;
}
.fab:active { transform: scale(.93); box-shadow: 0 2px 10px #05966966; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}
.bottom-nav button {
  flex: 1; background: none; border: none; color: var(--muted);
  font-family: inherit; font-size: 10px; font-weight: 600;
  padding: 10px 0 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: color .15s;
}
.bottom-nav button .icon { font-size: 20px; }
.bottom-nav button.active { color: var(--green); }

/* ── ACTION BAR (when items selected) ── */
.action-bar {
  position: fixed; bottom: calc(70px + var(--safe-bottom)); left: 0; right: 0;
  background: var(--card2); border-top: 1px solid var(--border);
  display: none; align-items: center; gap: 8px; padding: 10px 12px;
  z-index: 90;
}
.action-bar.show { display: flex; }
.action-bar .sel-count { font-size: 13px; font-weight: 600; flex: 1; color: var(--blue); }

/* ══════════════════════════════════════════════════════════
   GRÁFICOS / RELATÓRIOS
══════════════════════════════════════════════════════════ */
#screen-charts {
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.charts-header {
  background: linear-gradient(135deg, #059669, #047857);
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
}
.charts-content { padding: 12px; }

.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
}
.chart-card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }

.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-row .lbl { font-size: 12px; color: var(--text); width: 100px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-row .bar-wrap { flex: 1; background: var(--card2); border-radius: 4px; height: 12px; overflow: hidden; }
.bar-row .bar-fill { height: 100%; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.bar-row .bar-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); width: 80px; text-align: right; flex-shrink: 0; }

.pie-labels { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.pie-label { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

canvas { width: 100% !important; max-height: 200px; }

/* ══════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 200; display: none; align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 92dvh; overflow-y: auto;
  padding: 0 0 calc(16px + var(--safe-bottom));
  animation: slide-up .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slide-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 10px auto 0;
}
.modal-title {
  font-size: 17px; font-weight: 700; padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.form-group { padding: 10px 16px 0; }
.form-group label {
  display: block; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
}

.type-toggle { display: flex; gap: 8px; padding: 10px 16px 0; }
.type-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); background: var(--card2);
  color: var(--muted); font-family: inherit; font-size: 14px;
  font-weight: 700; cursor: pointer; transition: all .15s;
}
.type-btn.active-r { border-color: var(--green); background: var(--green-dim); color: var(--green); }
.type-btn.active-d { border-color: var(--red); background: var(--red-dim); color: var(--red); }

.rec-options { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 16px 0; }
.rec-btn {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--muted); font-family: inherit; font-size: 12px;
  font-weight: 600; padding: 7px 12px; border-radius: 20px;
  cursor: pointer; transition: all .15s;
}
.rec-btn.active { background: var(--btn); border-color: var(--btn); color: #fff; }

.form-actions { display: flex; gap: 8px; padding: 16px 16px 0; }
.preview-box {
  margin: 10px 16px 0;
  background: #0d1f3c; border: 1px solid #1e3a5f;
  border-radius: var(--radius-sm); padding: 12px;
  font-size: 12px; line-height: 1.8; color: var(--blue);
  font-family: 'JetBrains Mono', monospace;
  display: none;
}
.preview-box.show { display: block; }

/* ══════════════════════════════════════════════════════════
   MODAL DETAIL
══════════════════════════════════════════════════════════ */
.detail-row {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.detail-row:last-child { border-bottom: none; }
.detail-row .dlbl { font-size: 12px; color: var(--muted); width: 100px; flex-shrink: 0; }
.detail-row .dval { font-size: 14px; font-weight: 600; flex: 1; }

/* ══════════════════════════════════════════════════════════
   PASSWORD MODAL
══════════════════════════════════════════════════════════ */
.pwd-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.8);
  z-index: 300; display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.pwd-modal.show { display: flex; }
.pwd-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; width: 100%; max-width: 340px;
}
.pwd-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; font-weight: 600;
  padding: 10px 20px; border-radius: 20px;
  opacity: 0; transition: all .3s; z-index: 500;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Overflow helpers */
.clock-bar {
  background: #0d1015; border-bottom: 1px solid var(--border);
  padding: 5px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.clock-time { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--green); }
.clock-date { font-size: 12px; color: var(--blue); }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     TOAST
══════════════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     PASSWORD MODAL
══════════════════════════════════════════════════════════ -->
<div class="pwd-modal" id="pwd-modal">
  <div class="pwd-card">
    <h3 id="pwd-title">🔒 Senha</h3>
    <div id="pwd-fields"></div>
    <p class="err-msg" id="pwd-err"></p>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn full" id="pwd-confirm-btn" style="margin:0;flex:1">Entrar</button>
      <button class="btn btn-ghost" style="flex:1;margin:0" onclick="closePwdModal()">Cancelar</button>
    </div>
    <button class="btn btn-ghost full" style="margin-top:8px;font-size:12px" id="pwd-forgot-btn" onclick="showForgotPwd()">Esqueci minha senha</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     SCREEN: LOGIN
══════════════════════════════════════════════════════════ -->
<div class="screen active" id="screen-login">
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px;margin:auto;padding:20px 0">
    <div class="login-logo">💰</div>
    <div class="login-title">Finanças Moscardo</div>
    <div class="login-sub">Controle financeiro pessoal</div>
    <div class="login-card">
      <div class="section-label">Perfis</div>
      <div class="profile-list" id="profile-list">
        <div style="color:var(--muted);font-size:13px;text-align:center;padding:12px">Nenhum perfil criado ainda.</div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Novo perfil</div>
      <div class="input-row">
        <input type="text" id="new-profile-name" placeholder="Nome do perfil" style="flex:1">
        <button class="btn btn-sm" onclick="createProfile()">＋ Criar</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     SCREEN: APP MAIN
══════════════════════════════════════════════════════════ -->
<div class="screen" id="screen-app">
  <div class="app-header">
    <span class="logo">💰</span>
    <span class="title" id="app-user-name">Finanças</span>
    <button class="header-btn" onclick="switchUser()">Trocar</button>
    <button class="header-btn" onclick="openPwdConfig()">🔑</button>
  </div>

  <div class="clock-bar">
    <span class="clock-time" id="clock-time">00:00:00</span>
    <span class="clock-date" id="clock-date"></span>
  </div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label">Mai/2026</div>
    <button onclick="changeMonth(1)">›</button>
    <button class="today-btn" onclick="goToday()">Hoje</button>
  </div>

  <div class="summary-cards">
    <div class="s-card">
      <div class="label">Saldo</div>
      <div class="value" id="card-saldo">R$ 0</div>
    </div>
    <div class="s-card">
      <div class="label">Receitas</div>
      <div class="value green" id="card-receitas">R$ 0</div>
    </div>
    <div class="s-card">
      <div class="label">Despesas</div>
      <div class="value red" id="card-despesas">R$ 0</div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('Todos',this)">Todos</button>
    <button class="filter-tab" onclick="setFilter('Receitas',this)">Receitas</button>
    <button class="filter-tab" onclick="setFilter('Despesas',this)">Despesas</button>
  </div>

  <div class="tx-list-container" id="tx-list">
    <div class="tx-empty"><div class="big">📭</div>Nenhuma transação neste mês.</div>
  </div>

  <div class="action-bar" id="action-bar">
    <span class="sel-count" id="sel-count">0 selecionado(s)</span>
    <button class="btn btn-sm btn-ghost" onclick="clearSelection()">✕</button>
    <button class="btn btn-sm btn-blue" onclick="editSelected()">✏️ Editar</button>

<script>
// ══════════════════════════════════════════════════════════
// DATA LAYER — localStorage
// ══════════════════════════════════════════════════════════
const DEMO_TX = [
  {id:1,tipo:"Receita",descricao:"Salário",categoria:"Salário",valor:5000,data:"2026-05-01",fixo:false,parcelas:1,parcela_atual:1,grupo_id:null},
  {id:2,tipo:"Despesa",descricao:"Aluguel",categoria:"Moradia",valor:1500,data:"2026-05-01",fixo:true,parcelas:1,parcela_atual:1,grupo_id:"fixo_2"},
  {id:3,tipo:"Despesa",descricao:"Supermercado",categoria:"Alimentação",valor:480,data:"2026-05-10",fixo:false,parcelas:1,parcela_atual:1,grupo_id:null},
  {id:4,tipo:"Receita",descricao:"Freelance design",categoria:"Freelance",valor:1200,data:"2026-05-15",fixo:false,parcelas:1,parcela_atual:1,grupo_id:null},
  {id:5,tipo:"Despesa",descricao:"Celular (1/12)",categoria:"Lazer",valor:150,data:"2026-05-05",fixo:false,parcelas:12,parcela_atual:1,grupo_id:"parc_5"},
  {id:6,tipo:"Despesa",descricao:"Celular (2/12)",categoria:"Lazer",valor:150,data:"2026-06-05",fixo:false,parcelas:12,parcela_atual:2,grupo_id:"parc_5"},
];
const CATS_DEFAULT = {
  Receita: ["Salário","Freelance","Investimentos","Presente","Outros"],
  Despesa: ["Moradia","Alimentação","Transporte","Saúde","Lazer","Educação","Roupas","Outros"]
};

function loadUsers() {
  try { return JSON.parse(localStorage.getItem('fm_users') || '[]'); } catch { return []; }
}
function saveUsers(u) { localStorage.setItem('fm_users', JSON.stringify(u)); }
function loadTx(user) {
  try {
    const d = JSON.parse(localStorage.getItem(`fm_tx_${user}`) || 'null');
    if (d) return d;
  } catch {}
  return JSON.parse(JSON.stringify(DEMO_TX));
}
function saveTxData(user, data) { localStorage.setItem(`fm_tx_${user}`, JSON.stringify(data)); }
function loadCats(user) {
  try { return JSON.parse(localStorage.getItem(`fm_cats_${user}`) || 'null') || JSON.parse(JSON.stringify(CATS_DEFAULT)); }
  catch { return JSON.parse(JSON.stringify(CATS_DEFAULT)); }
}
function saveCats(user, cats) { localStorage.setItem(`fm_cats_${user}`, JSON.stringify(cats)); }

function hashStr(s) {
  if (!s) return '';
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  return 'h' + Math.abs(h).toString(36);
}

// ══════════════════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════════════════
let currentUser = null;
let transactions = [];
let categorias = JSON.parse(JSON.stringify(CATS_DEFAULT));
let selMonth, selYear;
let filter = 'Todos';
let selectedIds = new Set();
let editingId = null;
let currentTxType = 'Despesa';
let currentRec = 'Normal';
let detailTxId = null;
const RESET_PWD = '05061985';

// ══════════════════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════════════════
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MESES_N = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function tickClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${hh}:${mm}:${ss}`;
  const d = DIAS[now.getDay()];
  document.getElementById('clock-date').textContent = `${d}, ${String(now.getDate()).padStart(2,'0')} ${MESES_N[now.getMonth()]} ${now.getFullYear()}`;
  setTimeout(tickClock, 1000);
}
tickClock();

// ══════════════════════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════════════════════
function addMonths(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().slice(0,10);
}
function fmtMoney(v) {
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function isoToMesStr(y, m) {
  return `${MESES_N[m-1]}/${y}`;
}
function nextId() {
  return (Math.max(0, ...transactions.map(t=>t.id)) + 1);
}

// ══════════════════════════════════════════════════════════
// AUTO GENERATE FIXOS
// ══════════════════════════════════════════════════════════
function generateFixos(toYear, toMonth) {
  const fim = new Date(toYear, toMonth - 1, 1); // first day of target month
  const grupos = {};
  transactions.forEach(t => {
    if (!t.fixo || !t.grupo_id) return;
    const d = new Date(t.data + 'T12:00:00');
    if (!grupos[t.grupo_id] || d < new Date(grupos[t.grupo_id].data + 'T12:00:00'))
      grupos[t.grupo_id] = t;
  });

  let changed = false;
  Object.values(grupos).forEach(t => {
    let cur = new Date(t.data + 'T12:00:00');
    cur.setMonth(cur.getMonth() + 1);
    while (cur <= fim) {
      const ds = cur.toISOString().slice(0,10);
      const exists = transactions.some(x => x.grupo_id === t.grupo_id && x.data === ds);
      if (!exists) {
        transactions.push({ ...t, id: nextId(), data: ds });
        changed = true;
      }
      cur.setMonth(cur.getMonth() + 1);
    }
  });
  if (changed) saveTxData(currentUser, transactions);
}

// ══════════════════════════════════════════════════════════
// LOGIN / PROFILE SCREEN
// ══════════════════════════════════════════════════════════
function renderProfiles() {
  const users = loadUsers();
  const list = document.getElementById('profile-list');
  if (!users.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px">Nenhum perfil criado ainda.</div>';
    return;
  }
  list.innerHTML = users.map(u => `
    <div class="profile-item" onclick="openProfile('${u.nome}')">
      <span class="icon">${u.senha ? '🔒' : '👤'}</span>
      <span class="name">${u.nome}</span>
      <div class="profile-actions" onclick="event.stopPropagation()">
        <button onclick="deleteProfile('${u.nome}')" title="Excluir">🗑</button>
      </div>
    </div>
  `).join('');
}

function createProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) { showToast('Digite um nome!'); return; }
  const users = loadUsers();
  if (users.find(u => u.nome === name)) { showToast('Perfil já existe!'); return; }
  users.push({ nome: name, senha: '' });
  saveUsers(users);
  document.getElementById('new-profile-name').value = '';
  renderProfiles();
  showToast('✅ Perfil criado!');
}

function deleteProfile(nome) {
  const users = loadUsers();
  const u = users.find(x => x.nome === nome);
  if (u && u.senha) {
    openPwdModal(nome, () => confirmDeleteProfile(nome));
    return;
  }
  if (confirm(`Excluir o perfil "${nome}"? Todos os dados serão apagados.`)) confirmDeleteProfile(nome);
}
function confirmDeleteProfile(nome) {
  const users = loadUsers().filter(u => u.nome !== nome);
  saveUsers(users);
  localStorage.removeItem(`fm_tx_${nome}`);
  localStorage.removeItem(`fm_cats_${nome}`);
  renderProfiles();
  showToast('✅ Perfil excluído');
}

function openProfile(nome) {
  const users = loadUsers();
  const u = users.find(x => x.nome === nome);
  if (u && u.senha) {
    openPwdModal(nome, () => loginUser(nome));
  } else {
    loginUser(nome);
  }
}

function loginUser(nome) {
  currentUser = nome;
  transactions = loadTx(nome);
  categorias = loadCats(nome);
  const today = new Date();
  selMonth = today.getMonth() + 1;
  selYear = today.getFullYear();
  selectedIds.clear();
  document.getElementById('app-user-name').textContent = `💰 ${nome}`;
  showScreen('screen-app');
  generateFixos(selYear, selMonth);
  refresh();
}

// ══════════════════════════════════════════════════════════
// PASSWORD MODAL
// ══════════════════════════════════════════════════════════
let pwdCallback = null;
let pwdTargetUser = null;

function openPwdModal(nome, cb) {
  pwdCallback = cb;
  pwdTargetUser = nome;
  document.getElementById('pwd-title').textContent = `🔒 ${nome}`;
  document.getElementById('pwd-err').textContent = '';
  document.getElementById('pwd-fields').innerHTML = `
    <label style="font-size:12px;color:var(--muted)">Senha</label>
    <input type="password" id="pwd-input" placeholder="Digite sua senha"
           style="margin-top:6px" onkeydown="if(event.key==='Enter')confirmPwd()">
  `;
  document.getElementById('pwd-modal').classList.add('show');
  setTimeout(() => document.getElementById('pwd-input')?.focus(), 100);
}

function confirmPwd() {
  const pwd = document.getElementById('pwd-input')?.value || '';
  const users = loadUsers();
  const u = users.find(x => x.nome === pwdTargetUser);
  const ok = (u && (hashStr(pwd) === u.senha || pwd === RESET_PWD));
  if (ok) {
    if (pwd === RESET_PWD && u.senha) {
      u.senha = ''; saveUsers(users);
      showToast('Senha resetada!');
    }
    closePwdModal();
    if (pwdCallback) pwdCallback();
  } else {
    document.getElementById('pwd-err').textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('pwd-input').value = '';
  }
}
document.getElementById('pwd-confirm-btn').onclick = confirmPwd;

function closePwdModal() {
  document.getElementById('pwd-modal').classList.remove('show');
}

function showForgotPwd() {
  document.getElementById('pwd-fields').innerHTML = `
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px">Digite a senha master de reset:</p>
    <input type="password" id="pwd-input" placeholder="Senha master"
           onkeydown="if(event.key==='Enter')confirmPwd()">
  `;
  document.getElementById('pwd-err').textContent = '';
}

// ══════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(tab, btn) {
  if (tab === 'transactions') {
    showScreen('screen-app');
    document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
    document.querySelector('.bottom-nav button').classList.add('active');
  } else if (tab === 'charts') {
    showScreen('screen-charts');
    renderCharts();
    if (btn) {
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  }
}

function switchUser() { showScreen('screen-login'); renderProfiles(); }

// ══════════════════════════════════════════════════════════
// REFRESH / RENDER
// ══════════════════════════════════════════════════════════
function refresh() {
  generateFixos(selYear, selMonth);
  document.getElementById('month-label').textContent = isoToMesStr(selYear, selMonth);

  const mes = transactions.filter(t => {
    const [y,m] = t.data.split('-');
    return +y === selYear && +m === selMonth;
  });

  const totalR = mes.filter(t => t.tipo === 'Receita').reduce((s,t) => s + t.valor, 0);
  const totalD = mes.filter(t => t.tipo === 'Despesa' && !t.ignorar_no_mes).reduce((s,t) => s + t.valor, 0);
  const saldo = totalR - totalD;

  const cardSaldo = document.getElementById('card-saldo');
  cardSaldo.textContent = fmtMoney(saldo);
  cardSaldo.className = 'value ' + (saldo >= 0 ? 'green' : 'red');
  document.getElementById('card-receitas').textContent = fmtMoney(totalR);
  document.getElementById('card-despesas').textContent = fmtMoney(totalD);

  let filtered = [...mes];
  if (filter === 'Receitas') filtered = filtered.filter(t => t.tipo === 'Receita');
  if (filter === 'Despesas') filtered = filtered.filter(t => t.tipo === 'Despesa');
  filtered.sort((a, b) => a.data.localeCompare(b.data));

  const list = document.getElementById('tx-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="tx-empty"><div class="big">📭</div>Nenhuma transação neste mês.</div>';
    return;
  }

  const catIcons = {
    'Salário':'💼','Freelance':'💻','Investimentos':'📈','Presente':'🎁',
    'Moradia':'🏠','Alimentação':'🛒','Transporte':'🚗','Saúde':'💊',
    'Lazer':'🎮','Educação':'📚','Roupas':'👕','Outros':'📦',
    'Transferencia':'🔄','Transferência':'🔄'
  };

  list.innerHTML = filtered.map(t => {
    const isR = t.tipo === 'Receita';
    const icon = catIcons[t.categoria] || (isR ? '💰' : '💸');
    let badge = '';
    if (t.fixo) badge = '<span class="badge fixo">Fixo</span>';
    else if (t.financiado) badge = `<span class="badge fin">💳 ${t.parcela_atual}/${t.parcelas}</span>`;
    else if (t.parcelas > 1) badge = `<span class="badge parc">💳 ${t.parcela_atual}/${t.parcelas}</span>`;
    const selected = selectedIds.has(t.id) ? ' selected' : '';
    return `
      <div class="tx-item ${isR?'receita':'despesa'}${selected}" data-id="${t.id}"
           onclick="onTxClick(${t.id})" oncontextmenu="onTxLong(${t.id});return false"
           ontouchstart="touchStart(${t.id})" ontouchend="touchEnd()">
        <div class="tx-icon ${isR?'receita':'despesa'}">${icon}</div>
        <div class="tx-info">
          <div class="tx-desc">${t.descricao}</div>
          <div class="tx-meta">${fmtDate(t.data)} · ${t.categoria} ${badge}</div>
        </div>
        <div class="tx-value ${isR?'receita':'despesa'}">${isR?'+':'-'}${fmtMoney(t.valor)}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// TOUCH / LONG PRESS
// ══════════════════════════════════════════════════════════
let longPressTimer = null;
function touchStart(id) {
  longPressTimer = setTimeout(() => onTxLong(id), 600);
}
function touchEnd() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}
function onTxClick(id) {
  if (selectedIds.size > 0) { toggleSelect(id); return; }
  openDetail(id);
}
function onTxLong(id) {
  navigator.vibrate && navigator.vibrate(30);
  toggleSelect(id);
}
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateActionBar();
  refresh();
}
function clearSelection() {
  selectedIds.clear();
  updateActionBar();
  refresh();
}
function updateActionBar() {
  const bar = document.getElementById('action-bar');
  const fab = document.getElementById('fab');
  if (selectedIds.size > 0) {
    bar.classList.add('show');
    fab.style.display = 'none';
    document.getElementById('sel-count').textContent = `${selectedIds.size} selecionado(s)`;
  } else {
    bar.classList.remove('show');
    fab.style.display = 'flex';
  }
}

// ══════════════════════════════════════════════════════════
// MONTH NAV
// ══════════════════════════════════════════════════════════
function changeMonth(d) {
  selMonth += d;
  if (selMonth > 12) { selMonth = 1; selYear++; }
  if (selMonth < 1) { selMonth = 12; selYear--; }
  selectedIds.clear();
  updateActionBar();
  refresh();
}
function goToday() {
  const now = new Date();
  selMonth = now.getMonth() + 1; selYear = now.getFullYear();
  refresh();
}
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refresh();
}

// ══════════════════════════════════════════════════════════
// ADD / EDIT TRANSACTION MODAL
// ══════════════════════════════════════════════════════════
function openAddModal() {
  editingId = null;
  currentTxType = 'Despesa';
  currentRec = 'Normal';
  document.getElementById('modal-tx-title').textContent = 'Nova Transação';
  document.getElementById('btn-save-tx').textContent = 'Adicionar';
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-valor').value = '';
  const today = new Date();
  document.getElementById('tx-data').value = `${selYear}-${String(selMonth).padStart(2,'0')}-01`;
  document.getElementById('tx-parcelas').value = 2;
  document.getElementById('tx-juros').value = '1.0';
  setTxType('Despesa');
  setRec('Normal', document.querySelector('.rec-btn'));
  document.getElementById('modal-tx').classList.add('show');
}

function openEditModal(id) {
  const t = transactions.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  currentTxType = t.tipo;
  currentRec = t.fixo ? 'Fixo' : (t.financiado ? 'Financiado' : (t.parcelas > 1 ? 'Parcelado' : 'Normal'));
  document.getElementById('modal-tx-title').textContent = 'Editar Transação';
  document.getElementById('btn-save-tx').textContent = 'Salvar';
  document.getElementById('tx-desc').value = t.descricao;
  document.getElementById('tx-valor').value = t.valor;
  document.getElementById('tx-data').value = t.data;
  document.getElementById('tx-parcelas').value = t.parcelas || 2;
  document.getElementById('tx-juros').value = t.taxa_juros ? (t.taxa_juros * 100).toFixed(2) : '1.0';
  setTxType(t.tipo);
  // set rec button
  const recBtns = document.querySelectorAll('.rec-btn');
  recBtns.forEach(b => b.classList.remove('active'));
  recBtns.forEach(b => { if (b.textContent.includes(currentRec === 'Fixo' ? 'Fixo' : currentRec === 'Financiado' ? 'Financiado' : currentRec === 'Parcelado' ? 'Parcelado' : 'Normal')) b.classList.add('active'); });
  setRec(currentRec, null, true);
  document.getElementById('modal-tx').classList.add('show');
}

function setTxType(tipo) {
  currentTxType = tipo;
  const dBtn = document.getElementById('btn-type-d');
  const rBtn = document.getElementById('btn-type-r');
  dBtn.className = 'type-btn' + (tipo === 'Despesa' ? ' active-d' : '');
  rBtn.className = 'type-btn' + (tipo === 'Receita' ? ' active-r' : '');
  updateCatSelect();
}

function updateCatSelect() {
  const sel = document.getElementById('tx-cat');
  const cats = (categorias[currentTxType] || []);
  const cur = sel.value;
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('') +
    '<option value="__nova__">＋ Nova categoria...</option>';
  if (cats.includes(cur)) sel.value = cur;
  sel.onchange = () => {
    if (sel.value === '__nova__') {
      const nova = prompt(`Nova categoria de ${currentTxType.toLowerCase()}:`);
      if (nova && nova.trim()) {
        const n = nova.trim();
        if (!categorias[currentTxType].includes(n)) {
          const oi = categorias[currentTxType].indexOf('Outros');
          if (oi >= 0) categorias[currentTxType].splice(oi, 0, n);
          else categorias[currentTxType].push(n);
          saveCats(currentUser, categorias);
        }
        updateCatSelect();
        document.getElementById('tx-cat').value = n;
      } else {
        sel.value = cats[0] || '';
      }
    }
  };
}

function setRec(rec, btn, silent) {
  currentRec = rec;
  if (!silent) {
    document.querySelectorAll('.rec-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  }
  document.getElementById('parc-row').style.display = (rec === 'Parcelado' || rec === 'Financiado') ? 'block' : 'none';
  document.getElementById('juros-row').style.display = rec === 'Financiado' ? 'block' : 'none';
  document.getElementById('lbl-valor').textContent = rec === 'Financiado' ? 'Valor da parcela (sem juros) — R$' : 'Valor (R$)';
  if (rec !== 'Financiado') document.getElementById('price-preview').classList.remove('show');
  else updatePreview();
}

function updatePreview() {
  const pmt = parseFloat(document.getElementById('tx-valor').value) || 0;
  const n = parseInt(document.getElementById('tx-parcelas').value) || 2;
  const taxa = (parseFloat(document.getElementById('tx-juros').value) || 0) / 100;
  const box = document.getElementById('price-preview');
  if (!pmt || !n || taxa <= 0) { box.classList.remove('show'); return; }
  const pv = pmt * (1 - Math.pow(1 + taxa, -n)) / taxa;
  const j1 = pv * taxa;
  const total = pmt * n;
  const totalJuros = total - pv;
  box.innerHTML = `📊 Tabela Price — parcela fixa ${fmtMoney(pmt)}/mês
Valor financiado (PV): ${fmtMoney(pv)}
1ª parcela: ${fmtMoney(pmt)}  [maior juros: ${fmtMoney(j1)}]
Total pago: ${fmtMoney(total)}  |  Juros: ${fmtMoney(totalJuros)}`;
  box.classList.add('show');
}
document.getElementById('tx-valor').addEventListener('input', () => { if (currentRec === 'Financiado') updatePreview(); });
document.getElementById('tx-parcelas').addEventListener('input', updatePreview);

function closeTxModal() { document.getElementById('modal-tx').classList.remove('show'); }

function saveTx() {
  const desc = document.getElementById('tx-desc').value.trim();
  const valor = parseFloat(document.getElementById('tx-valor').value);
  const data = document.getElementById('tx-data').value;
  const cat = document.getElementById('tx-cat').value;

  if (!desc || isNaN(valor) || valor <= 0 || !data || !cat || cat === '__nova__') {
    showToast('⚠️ Preencha todos os campos!'); return;
  }

  if (editingId !== null) {
    // Simple edit of single record
    const idx = transactions.findIndex(x => x.id === editingId);
    if (idx >= 0) {
      transactions[idx].descricao = desc;
      transactions[idx].valor = valor;
      transactions[idx].data = data;
      transactions[idx].categoria = cat;
      transactions[idx].tipo = currentTxType;
    }
    saveTxData(currentUser, transactions);
    showToast('✅ Transação editada');
    closeTxModal();
    refresh();
    return;
  }

  const gid = `grp_${nextId()}_${Date.now()}`;

  if (currentRec === 'Fixo') {
    transactions.push({ id: nextId(), tipo: currentTxType, descricao: desc, categoria: cat, valor, data, fixo: true, parcelas: 1, parcela_atual: 1, grupo_id: gid });
    generateFixos(selYear, selMonth);
  } else if (currentRec === 'Parcelado') {
    const n = parseInt(document.getElementById('tx-parcelas').value) || 2;
    for (let i = 0; i < n; i++) {
      const di = addMonths(data, i);
      transactions.push({ id: nextId(), tipo: currentTxType, descricao: `${desc} (${i+1}/${n})`, categoria: cat, valor, data: di, fixo: false, parcelas: n, parcela_atual: i+1, grupo_id: gid });
    }
  } else if (currentRec === 'Financiado') {
    const n = parseInt(document.getElementById('tx-parcelas').value) || 2;
    const taxa = (parseFloat(document.getElementById('tx-juros').value) || 1) / 100;
    if (taxa <= 0) { showToast('⚠️ Taxa inválida'); return; }
    const pmt = valor;
    const pv = pmt * (1 - Math.pow(1 + taxa, -n)) / taxa;
    let saldo = pv;
    for (let i = 0; i < n; i++) {
      const juros_mes = Math.round(saldo * taxa * 100) / 100;
      let amort = Math.round((pmt - juros_mes) * 100) / 100;
      let pmt_real = pmt;
      if (i === n - 1) { amort = saldo; pmt_real = Math.round((amort + juros_mes) * 100) / 100; }
      const saldo_novo = Math.round((saldo - amort) * 100) / 100;
      const di = addMonths(data, i);
      transactions.push({ id: nextId(), tipo: currentTxType, descricao: `${desc} (${i+1}/${n})`, categoria: cat, valor: pmt_real, data: di, fixo: false, parcelas: n, parcela_atual: i+1, grupo_id: gid, financiado: true, taxa_juros: taxa, valor_original: Math.round(pv*100)/100, amort_fixa: pmt, juros_parcela: juros_mes, amort_parcela: amort, saldo_devedor: saldo_novo, ignorar_no_mes: true });
      saldo = saldo_novo;
    }
  } else {
    transactions.push({ id: nextId(), tipo: currentTxType, descricao: desc, categoria: cat, valor, data, fixo: false, parcelas: 1, parcela_atual: 1, grupo_id: null });
  }

  saveTxData(currentUser, transactions);
  showToast('✅ Transação salva');
  closeTxModal();
  refresh();
}

function deleteById(id) {
  const t = transactions.find(x => x.id === id);
  if (!t) return;
  if (t.grupo_id) {
    const grupo = transactions.filter(x => x.grupo_id === t.grupo_id);
    const tipo_txt = t.fixo ? 'Fixo' : `Parcelado (${grupo.length} parcelas)`;
    const r = confirm(`Este lançamento é parte de um grupo (${tipo_txt}).\n\nOK = excluir só este\nCancelar = não excluir\n\n(Para excluir o grupo inteiro, use seleção múltipla)`);
    if (!r) return;
    transactions = transactions.filter(x => x.id !== id);
  } else {
    if (!confirm('Excluir esta transação?')) return;
    transactions = transactions.filter(x => x.id !== id);
  }
  saveTxData(currentUser, transactions);
  showToast('✅ Excluído');
  refresh();
}

function deleteSelected() {
  const ids = [...selectedIds];
  if (!ids.length) return;
  if (!confirm(`Excluir ${ids.length} transação(ões) selecionada(s)?`)) return;
  transactions = transactions.filter(t => !ids.includes(t.id));
  saveTxData(currentUser, transactions);
  selectedIds.clear();
  updateActionBar();
  showToast(`✅ ${ids.length} excluído(s)`);
  refresh();
}

function editSelected() {
  if (selectedIds.size !== 1) { showToast('Selecione apenas 1 para editar'); return; }
  const id = [...selectedIds][0];
  selectedIds.clear();
  updateActionBar();
  refresh();
  openEditModal(id);
}

function openSaldoModal() {
  const body = document.getElementById('saldo-body');
  // Compute past months
  const items = [];
  for (let i = 1; i <= 12; i++) {
    let m = selMonth - i; let y = selYear;
    while (m <= 0) { m += 12; y--; }
    const mes = transactions.filter(t => { const [ty,tm] = t.data.split('-'); return +ty===y && +tm===m; });
    const r = mes.filter(t=>t.tipo==='Receita').reduce((s,t)=>s+t.valor,0);
    const d = mes.filter(t=>t.tipo==='Despesa'&&!t.ignorar_no_mes).reduce((s,t)=>s+t.valor,0);
    const saldo = r - d;
    items.push({ y, m, saldo, label: isoToMesStr(y, m) });
  }

  const checkboxes = items.map((it, i) =>
    `<label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer">
      <input type="checkbox" id="saldo-cb-${i}" style="width:18px;height:18px;accent-color:var(--green)" onchange="updateSaldoTotal()">
      <span style="flex:1;font-size:14px;font-weight:600">${it.label}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:${it.saldo>=0?'var(--green)':'var(--red)'}">
        ${it.saldo>=0?'+':'-'}${fmtMoney(it.saldo)}
      </span>
    </label>`
  ).join('');

  body.innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">
      Selecione os meses cujo saldo deseja puxar para <strong style="color:var(--text)">${isoToMesStr(selYear,selMonth)}</strong>:
    </p>
    ${checkboxes}
    <div id="saldo-total" style="font-size:14px;font-weight:700;margin:12px 0;min-height:20px"></div>
    <button class="btn full" onclick="confirmSaldo(${JSON.stringify(items).replace(/"/g,'&quot;')})">Confirmar</button>
  `;
  document.getElementById('modal-saldo').classList.add('show');
}

function updateSaldoTotal() {
  const body = document.getElementById('saldo-body');
  if (!body) return;
  const checks = body.querySelectorAll('input[type=checkbox]');
  const totDiv = document.getElementById('saldo-total');
  let sum = 0;
  checks.forEach((cb, i) => {
    if (cb.checked) {
      const lbl = cb.parentElement.querySelector('span:last-child');
      const txt = lbl?.textContent?.trim().replace(/[^\d,.-]/g,'').replace(',','.');
      const v = parseFloat(txt) || 0;
      sum += lbl?.style?.color?.includes('green') ? v : -v;
    }
  });
  totDiv.textContent = sum !== 0 ? `Total: ${sum>=0?'+':'-'}${fmtMoney(sum)}` : '';
  totDiv.style.color = sum >= 0 ? 'var(--green)' : 'var(--red)';
}

function confirmSaldo(items) {
  const body = document.getElementById('saldo-body');
  const checks = body.querySelectorAll('input[type=checkbox]');
  const sel = [];
  checks.forEach((cb, i) => { if (cb.checked) sel.push(items[i]); });
  if (!sel.length) { showToast('Selecione ao menos um mês'); return; }

  const total = sel.reduce((s, it) => s + it.saldo, 0);
  if (total === 0) { showToast('Saldo selecionado é zero'); return; }

  const tipo = total > 0 ? 'Receita' : 'Despesa';
  const periodo = sel.length === 1 ? sel[0].label : `${sel[sel.length-1].label} a ${sel[0].label}`;

  // Remove existing saldo acumulado for this month
  transactions = transactions.filter(t => {
    const [ty,tm] = t.data.split('-');
    return !(+ty===selYear && +tm===selMonth && t.descricao?.startsWith('Saldo acumulado'));
  });

  transactions.push({
    id: nextId(), tipo, descricao: `Saldo acumulado ${periodo}`,
    categoria: 'Transferencia', valor: Math.abs(total),
    data: `${selYear}-${String(selMonth).padStart(2,'0')}-01`,
    fixo: false, parcelas: 1, parcela_atual: 1, grupo_id: null
  });
  saveTxData(currentUser, transactions);
  showToast('✅ Saldo puxado com sucesso!');
  document.getElementById('modal-saldo').classList.remove('show');
  refresh();
}

// ══════════════════════════════════════════════════════════
// CHARTS
// ══════════════════════════════════════════════════════════
function renderCharts() {
  const mes = transactions.filter(t => {
    const [y,m] = t.data.split('-');
    return +y === selYear && +m === selMonth;
  });

  const byDespCat = {};
  const byRecCat = {};
  mes.forEach(t => {
    if (t.tipo === 'Despesa' && !t.ignorar_no_mes) {
      byDespCat[t.categoria] = (byDespCat[t.categoria]||0) + t.valor;
    } else if (t.tipo === 'Receita') {
      byRecCat[t.categoria] = (byRecCat[t.categoria]||0) + t.valor;
    }
  });

  const despSorted = Object.entries(byDespCat).sort((a,b)=>b[1]-a[1]);
  const recSorted = Object.entries(byRecCat).sort((a,b)=>b[1]-a[1]);
  const maxD = despSorted[0]?.[1] || 1;
  const maxR = recSorted[0]?.[1] || 1;

  const COLORS = ['#34d399','#60a5fa','#c084fc','#fbbf24','#f87171','#34d3d3','#f472b6','#a3e635','#fb923c','#e879f9'];

  const totalD = despSorted.reduce((s,[,v])=>s+v,0);
  const totalR = recSorted.reduce((s,[,v])=>s+v,0);

  // 6-month evolution
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let m = selMonth - i; let y = selYear;
    while (m <= 0) { m += 12; y--; }
    const txm = transactions.filter(t => { const [ty,tm] = t.data.split('-'); return +ty===y && +tm===m; });
    const r = txm.filter(t=>t.tipo==='Receita').reduce((s,t)=>s+t.valor,0);
    const d = txm.filter(t=>t.tipo==='Despesa'&&!t.ignorar_no_mes).reduce((s,t)=>s+t.valor,0);
    months.push({ label: MESES_N[m-1], r, d });
  }
  const maxEvo = Math.max(...months.flatMap(m=>[m.r,m.d]),1);

  document.getElementById('charts-content').innerHTML = `
    <div class="chart-card">
      <h3>📅 Evolução 6 meses</h3>
      <div style="display:flex;gap:4px;align-items:flex-end;height:120px;margin-bottom:8px">
        ${months.map(m => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%">
            <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;width:100%">
              <div style="width:100%;background:var(--green);height:${Math.round(m.r/maxEvo*90)}px;border-radius:3px 3px 0 0;min-height:2px"></div>
              <div style="width:100%;background:var(--red);height:${Math.round(m.d/maxEvo*90)}px;border-radius:3px 3px 0 0;min-height:2px"></div>
            </div>
            <div style="font-size:9px;color:var(--muted)">${m.label}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:12px;justify-content:center;font-size:11px;color:var(--muted)">
        <span><span style="color:var(--green)">■</span> Receitas</span>
        <span><span style="color:var(--red)">■</span> Despesas</span>
      </div>
    </div>

    <div class="chart-card">
      <h3>📤 Despesas por categoria</h3>
      ${totalD === 0 ? '<p style="color:var(--muted);font-size:13px">Nenhuma despesa neste mês.</p>' : `
        <div class="bar-chart">
          ${despSorted.map(([cat,v],i)=>`
            <div class="bar-row">
              <div class="lbl" title="${cat}">${cat}</div>
              <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxD*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
              <div class="bar-val">${fmtMoney(v)}</div>
            </div>`).join('')}
        </div>`}
    </div>

    <div class="chart-card">
      <h3>📥 Receitas por categoria</h3>
      ${totalR === 0 ? '<p style="color:var(--muted);font-size:13px">Nenhuma receita neste mês.</p>' : `
        <div class="bar-chart">
          ${recSorted.map(([cat,v],i)=>`
            <div class="bar-row">
              <div class="lbl" title="${cat}">${cat}</div>
              <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxR*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
              <div class="bar-val">${fmtMoney(v)}</div>
            </div>`).join('')}
        </div>`}
    </div>

    <div class="chart-card">
      <h3>⚖️ Resumo do mês — ${isoToMesStr(selYear,selMonth)}</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--muted)">Receitas</span>
          <span style="font-family:'JetBrains Mono',monospace;color:var(--green);font-weight:700">+${fmtMoney(totalR)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--muted)">Despesas</span>
          <span style="font-family:'JetBrains Mono',monospace;color:var(--red);font-weight:700">-${fmtMoney(totalD)}</span>
        </div>
        <div style="height:1px;background:var(--border)"></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700">Saldo</span>
          <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:${totalR-totalD>=0?'var(--green)':'var(--red)'}">
            ${totalR-totalD>=0?'+':'-'}${fmtMoney(totalR-totalD)}
          </span>
        </div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════
function closeModalIfOverlay(e, id) {
  if (e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('show');
  }
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Enter key handlers
document.getElementById('new-profile-name').addEventListener('keydown', e => { if(e.key==='Enter') createProfile(); });

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
renderProfiles();
</script>
</body>
</html>
